
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cashback App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
    <h1>Calculadora de Cashback</h1>

    <form id="form">
      <input type="number" id="valor" placeholder="Valor da compra" required />

      <input type="number" id="desconto" placeholder="Desconto (%)" />

        <div class="vip-container">
           <label class="vip-label">
              <input type="checkbox" id="vip" />
              <span>Cliente VIP</span>
           </label>
        </div>

      <button type="submit">Calcular</button>
    </form>

    <div id="resultado"></div>

    <h2>Histórico</h2>
    <button onclick="carregarHistorico()">Atualizar</button>

    <ul id="historico"></ul>
  </div>

  <script src="script.js"></script>
    
</body>
</html>
